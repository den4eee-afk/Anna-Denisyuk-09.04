<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Pizza Place Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <span class="green">pizza</span><br>
            <span class="red">place</span>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Пошук піци...">
            <button id="searchBtn">🔍</button>
        </div>
    </header>

    <main class="grid" id="pizzaGrid">
        <div class="card" data-name="піца папероні">
            <div class="img-placeholder">
                <img src="https://img.freepik.com/premium-psd/pepperoni-pizza-isolated-transparent-background-png_645927-4873.jpg">
            </div>
            <button class="buy-btn">189 грн</button>
        </div>

        <div class="card active" data-name="мясна піца">
            <div class="img-placeholder">
                <img src="https://png.pngtree.com/png-clipart/20240525/original/pngtree-delicious-pizza-on-isolated-and-transparent-background-png-image_15168320.png">
            </div>

            <button class="buy-btn">189 грн</button>
        </div>

        <div class="card" data-name="сирна піца">
            <div class="img-placeholder">
                <img src="https://png.pngtree.com/png-clipart/20230502/original/pngtree-hot-cheesy-pizza-isolated-on-transparent-background-png-image_9133345.png">
            </div>
            <button class="buy-btn">189 грн</button>
        </div>

        <div class="card" data-name="гостра піца">
            <div class="img-placeholder">
                <img src="https://www.pngarts.com/files/3/Pizza-Transparent-Background-PNG.png">
            </div>
            <button class="buy-btn">189 грн</button>
        </div>

        
        <div class="card" data-name="гавайська піца">
            <div class="img-placeholder">
                <img src="https://png.pngtree.com/png-vector/20240724/ourmid/pngtree-hawaiian-pizza-with-pineapple-png-image_13047011.png">
            </div>
            <button class="buy-btn">189 грн</button>
        </div>

        
        <div class="card" data-name="американська піца">
            <div class="img-placeholder">
                <img src="https://thumbs.dreamstime.com/b/%D0%B0%D0%BC%D0%B5%D1%80%D0%B8%D0%BA%D0%B0%D0%BD%D1%81%D0%BA%D0%B0%D1%8F-%D0%BF%D0%B8%D1%86%D1%86%D0%B0-%D0%B8%D0%B7%D0%BE%D0%BB%D0%B8%D1%80%D0%BE%D0%B2%D0%B0%D0%BD%D0%B0-%D0%BD%D0%B0-%D0%BF%D1%80%D0%BE%D0%B7%D1%80%D0%B0%D1%87%D0%BD%D0%BE%D0%BC-%D1%84%D0%BE%D0%BD%D0%B5-%D1%81%D0%BE%D0%B7%D0%B4%D0%B0%D0%BD%D0%BE-%D1%81-%D0%BF%D0%BE%D0%BC%D0%BE%D1%89%D1%8C%D1%8E-346441654.jpg">
            </div>
            <button class="buy-btn">189 грн</button>
        </div>

    </main>

    <footer>
     <h2>вул. Шкільна 35 м.Здолбунів</h2> 
    </footer>

    <script src="script.js"></script>
</body>
</html>
